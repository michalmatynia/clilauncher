excluded:
  - .build
  - .swiftpm
  - .github

disabled_rules:
  - trailing_whitespace
  - vertical_whitespace
  # Style churn rules handled by swiftformat; keep lint focused on high-signal defects.
  - contrasted_opening_brace
  - opening_brace
  - explicit_acl
  - explicit_top_level_acl
  - explicit_type_interface
  - explicit_enum_raw_value
  - required_deinit
  - no_magic_numbers
  - type_contents_order
  - conditional_returns_on_newline
  - one_declaration_per_file
  - switch_case_on_newline
  - sorted_enum_cases
  - prefer_nimble
  - closure_body_length
  - identifier_name
  - indentation_width
  - legacy_objc_type
  - function_body_length
  - anonymous_argument_in_multiline_closure
  - line_length
  - file_length
  - type_body_length
  - accessibility_label_for_image
  - optional_data_string_conversion
  - closure_end_indentation
  - closure_spacing
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - multiline_arguments
  - multiline_arguments_brackets
  - multiline_function_chains
  - multiline_call_arguments
  - file_types_order
  - for_where
  - prefixed_toplevel_constant
  - single_test_class
  - xct_specific_matcher

opt_in_rules: []

line_length:
  warning: 220
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 600
  error: 1000

file_length:
  warning: 2200
  error: 3200
