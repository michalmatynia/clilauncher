name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: 5.9
      - name: Install SwiftDX tooling
        run: ./Scripts/install-swift-tools.sh
      - name: Run format check
        env:
          CI: 1
        run: make format-check
      - name: Run lint
        env:
          CI: 1
          SWIFTLINT_REPORTER: github-actions-logging
          SWIFTLINT_AGGRESSIVE: 1
        run: ./Scripts/lint.sh
      - name: Run smoke checks
        env:
          CI: 1
        run: make smoke
      - name: Run tests
        run: ./Scripts/test.sh
